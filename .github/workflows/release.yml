name: Release

on:
  push:
    branches: [master]

# Cancel stale runs for the same branch.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Release Please maintains a standing release PR from conventional commits
  # that land on master. When that PR is merged, release-please creates a
  # GitHub Release + tag; the subsequent push (the release commit itself)
  # triggers the publish job below with a concrete version number.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # Re-run the full CI gate suite on master pushes. Ensures that a direct
  # commit to master (or the merge commit from a develop→master PR) still has
  # all gates pass before we ship anything.
  # ---------------------------------------------------------------------------
  ci:
    name: CI gates
    needs: release-please
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      image-tag: ${{ needs.release-please.outputs.tag_name || github.sha }}

  # ---------------------------------------------------------------------------
  # On a release commit, publish the versioned Docker image to GHCR and attach
  # the image reference to the GitHub Release.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish release artefacts
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please, ci]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=${{ needs.release-please.outputs.major }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}

      - name: Build & push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Attach image reference to release
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cat > /tmp/release-note.md <<EOF
          ## Docker image

          Published to GitHub Container Registry:

          \`\`\`
          docker pull ${REGISTRY}/${IMAGE_NAME}:${TAG}
          docker pull ${REGISTRY}/${IMAGE_NAME}:latest
          \`\`\`

          Image digest: \`${DIGEST}\`

          ### Quick start

          \`\`\`
          docker run --gpus all --rm -it \\
              -v /path/to/models:/models:ro \\
              -p 8080:8080 \\
              ${REGISTRY}/${IMAGE_NAME}:${TAG} \\
              --serve --port 8080 -d cuda:0 -m /models/<your-model>.gguf
          \`\`\`
          EOF
          gh release view "${TAG}" --json body --jq .body > /tmp/existing-body.md || echo "" > /tmp/existing-body.md
          cat /tmp/existing-body.md /tmp/release-note.md > /tmp/final-body.md
          gh release edit "${TAG}" --notes-file /tmp/final-body.md
