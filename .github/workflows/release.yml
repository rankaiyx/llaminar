name: Release

on:
  push:
    branches: [master]

# Cancel stale runs for the same branch.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Release Please maintains a standing release PR from conventional commits
  # that land on master. When that PR is merged, release-please creates a
  # GitHub Release + tag; the subsequent push (the release commit itself)
  # triggers the publish job below with a concrete version number.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # Re-run the full CI gate suite on master pushes. Ensures that a direct
  # commit to master (or the merge commit from a develop→master PR) still has
  # all gates pass before we ship anything.
  # ---------------------------------------------------------------------------
  ci:
    name: CI gates
    needs: release-please
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      image-tag: ${{ needs.release-please.outputs.tag_name || github.sha }}

  # ---------------------------------------------------------------------------
  # On a release commit, the CI workflow above has already built and pushed
  # the versioned runtime image (tag = release tag_name, e.g. v0.1.0). Here
  # we just add the semver aliases (latest, major, major.minor) pointing at
  # the same digest, and edit the GitHub Release notes to reference it.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish release artefacts
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please, ci]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 30
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Alias versioned image to latest / major / major.minor
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
        run: |
          set -euo pipefail
          SRC="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          docker pull "${SRC}"
          for alias in latest "${MAJOR}" "${MAJOR}.${MINOR}"; do
            dst="${REGISTRY}/${IMAGE_NAME}:${alias}"
            docker tag "${SRC}" "${dst}"
            docker push "${dst}"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${SRC}" | awk -F'@' '{print $2}')
          echo "DIGEST=${DIGEST}" >> "${GITHUB_ENV}"

      - name: Attach image reference to release
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cat > /tmp/release-note.md <<EOF
          ## Docker image

          Published to GitHub Container Registry:

          \`\`\`
          docker pull ${REGISTRY}/${IMAGE_NAME}:${TAG}
          docker pull ${REGISTRY}/${IMAGE_NAME}:latest
          \`\`\`

          Image digest: \`${DIGEST}\`

          ### Quick start

          \`\`\`
          docker run --gpus all --rm -it \\
              -v /path/to/models:/models:ro \\
              -p 8080:8080 \\
              ${REGISTRY}/${IMAGE_NAME}:${TAG} \\
              --serve --port 8080 -d cuda:0 -m /models/<your-model>.gguf
          \`\`\`
          EOF
          gh release view "${TAG}" --json body --jq .body > /tmp/existing-body.md || echo "" > /tmp/existing-body.md
          cat /tmp/existing-body.md /tmp/release-note.md > /tmp/final-body.md
          gh release edit "${TAG}" --notes-file /tmp/final-body.md
