name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop]
  workflow_call:
    inputs:
      image-tag:
        description: "Tag applied to the runtime image published by this workflow"
        required: false
        type: string
        default: ci
    outputs:
      image-ref:
        description: "Full image reference (registry/owner/name:tag) of the published runtime image"
        value: ${{ jobs.ci.outputs.image-ref }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MODELS_DIR: /opt/llaminar-models
  # Tag used for the ephemeral builder image (not pushed to GHCR).
  BUILDER_IMAGE: llaminar-builder:${{ github.sha }}

jobs:
  # ===========================================================================
  # Single job on the self-hosted GPU runner. We build the full "builder"
  # Docker stage once (has source tree, Integration + Release builds, CUDA,
  # ROCm, test binaries), then exec ctest / benchmark scripts inside it for
  # each gate. Finally we build the slim runtime image and push to GHCR.
  #
  # Running every gate inside the same container removes the need to install
  # CUDA/ROCm/MPI on the host runner itself — Docker is the only host
  # dependency. It also keeps the CI environment bit-for-bit identical to the
  # devcontainer (same install-*.sh scripts) and to what we ship.
  # ===========================================================================
  ci:
    name: CI gates
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 240
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime-image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ inputs.image-tag || 'ci' }},enable=${{ inputs.image-tag != '' }}

      # ---------------------------------------------------------------------
      # Build the builder stage. `load: true` makes the image available to
      # the local Docker daemon so subsequent `docker run` steps can use it.
      # The builder image is NOT pushed to any registry.
      # ---------------------------------------------------------------------
      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: builder
          load: true
          tags: ${{ env.BUILDER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      # ---------------------------------------------------------------------
      # Gate 1: unit tests. Fast, no models needed, pure CPU/GPU isolation.
      # ---------------------------------------------------------------------
      - name: Gate 1 — Unit tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration \
                  --output-on-failure --parallel \
                  -R '^V2_Unit_'

      # ---------------------------------------------------------------------
      # Gate 2: PyTorch parity (Qwen2 + Qwen3.5). Needs models staged at
      # ${MODELS_DIR} on the runner host — mounted read-only at /src/models
      # so ctest sees them at the conventional path.
      # ---------------------------------------------------------------------
      - name: Stage models
        run: |
          if [ ! -d "${MODELS_DIR}" ]; then
            echo "::error::Models directory ${MODELS_DIR} not found on runner. Populate it with the GGUF weights referenced by the parity tests."
            exit 1
          fi
          ls -1 "${MODELS_DIR}" | head

      - name: Gate 2 — PyTorch parity (Qwen2 SingleDevice)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration --output-on-failure \
                  --timeout 900 -R '^V2_Integration_Parity_Qwen2_SingleDevice$'

      - name: Gate 2 — PyTorch parity (Qwen35 SingleDevice, 08B)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -e GTEST_FILTER='*08B*' \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration --output-on-failure \
                  --timeout 900 -R '^V2_Integration_Parity_Qwen35_SingleDevice$'

      - name: Gate 2 — PyTorch parity (Qwen2 NodeLocalTP)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration --output-on-failure \
                  --timeout 900 -R '^V2_Integration_Parity_NodeLocalTP$'

      - name: Gate 2 — PyTorch parity (Qwen35 NodeLocalTP, 08B)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -e GTEST_FILTER='*08B*' \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration --output-on-failure \
                  --timeout 900 -R '^V2_Integration_Parity_Qwen35_NodeLocalTP$'

      # ---------------------------------------------------------------------
      # Gate 3: E2E server tests. Drives the compiled llaminar2 binary via a
      # shell harness that boots the server and curls it.
      # ---------------------------------------------------------------------
      - name: Gate 3 — E2E server tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            tests/v2/e2e/server/test_server_e2e.sh \
              --binary build_v2_integration/llaminar2 \
              --backends "cpu,cuda:0,rocm:0"

      # ---------------------------------------------------------------------
      # Gate 4: performance ratchet. Uses the existing
      # .githooks/run_benchmark_check.sh (baseline is committed; agents are
      # forbidden to lower thresholds without explicit approval).
      # ---------------------------------------------------------------------
      - name: Gate 4 — Performance regression ratchet
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            .githooks/run_benchmark_check.sh

      # ---------------------------------------------------------------------
      # All gates passed. Build the slim runtime stage and push to GHCR
      # (non-PR only — PRs only build, never publish).
      # ---------------------------------------------------------------------
      - name: Build + push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}
          path: |
            /tmp/srv_*.log
            tests/v2/integration/parity/results/
          if-no-files-found: ignore
          retention-days: 14
